<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Connect</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary sticky-top shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold d-flex align-items-center gap-2">
        <i class="bi bi-mortarboard-fill"></i>
        <span>Campus Connect</span>
        <span id="offlineBadge" class="badge bg-warning text-dark ms-2 d-none">offline</span>
      </span>
      <div class="d-flex align-items-center gap-2">
        <span class="text-white-50 small d-none d-sm-inline" id="whoAmI"></span>
        <button class="btn btn-sm btn-outline-light" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i> <span class="d-none d-sm-inline">Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Tabs -->
  <ul class="nav nav-tabs nav-fill bg-white shadow-sm sticky-top" id="mainTabs" style="top:56px;z-index:1020;">
    <li class="nav-item">
      <a class="nav-link active" data-tab="feed" href="#"><i class="bi bi-house"></i> Feed</a>
    </li>
    <li class="nav-item d-none" id="tabCompose">
      <a class="nav-link" data-tab="compose" href="#"><i class="bi bi-pencil-square"></i> Post</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" data-tab="subs" href="#"><i class="bi bi-bell"></i> Subscriptions</a>
    </li>
    <li class="nav-item d-none" id="tabAdmin">
      <a class="nav-link" data-tab="admin" href="#"><i class="bi bi-gear"></i> Admin</a>
    </li>
  </ul>

  <main class="container py-3" id="appMain">

    <!-- ============ FEED ============ -->
    <section data-pane="feed">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Latest posts</h2>
        <button class="btn btn-sm btn-outline-primary" id="refreshFeedBtn">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
      <div id="feedStatus" class="alert alert-info small d-none"></div>
      <div id="feedList" class="d-flex flex-column gap-3">
        <div class="text-center text-muted py-5"><div class="spinner-border" role="status"></div></div>
      </div>
    </section>

    <!-- ============ COMPOSE (publisher / admin) ============ -->
    <section data-pane="compose" class="d-none">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Create a new post</h2>
          <form id="composeForm">
            <div class="mb-3">
              <label for="postTitle" class="form-label fw-semibold">Title</label>
              <input id="postTitle" type="text" class="form-control" maxlength="200" required>
            </div>
            <div class="mb-3">
              <label for="postContent" class="form-label fw-semibold">Content</label>
              <textarea id="postContent" class="form-control" rows="5" required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Audience</label>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="audience" id="audAll" value="all" checked>
                <label class="form-check-label" for="audAll">
                  Everyone <span class="text-muted small">(default)</span>
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="audience" id="audDept" value="department">
                <label class="form-check-label" for="audDept">Specific department(s)</label>
              </div>
            </div>

            <div class="mb-3 d-none" id="deptPickerWrap">
              <label class="form-label fw-semibold">Choose departments</label>
              <div id="deptPicker" class="border rounded p-2 dept-picker">
                <div class="text-muted small">Loading…</div>
              </div>
            </div>

            <div id="composeError" class="alert alert-danger small d-none"></div>
            <div id="composeOk" class="alert alert-success small d-none">Posted!</div>

            <button class="btn btn-primary" type="submit" id="composeBtn">
              <i class="bi bi-send"></i> Publish
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- ============ SUBSCRIPTIONS ============ -->
    <section data-pane="subs" class="d-none">
      <h2 class="h5 mb-3">Publishers</h2>
      <p class="text-muted small">Subscribe to faculty, departments and clubs to follow their posts.</p>
      <div id="publisherList" class="d-flex flex-column gap-2">
        <div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm" role="status"></div></div>
      </div>
    </section>

    <!-- ============ ADMIN ============ -->
    <section data-pane="admin" class="d-none">
      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <h2 class="h5 mb-3">Add a new user</h2>
          <form id="addUserForm" class="row g-2">
            <div class="col-12 col-md-6">
              <label class="form-label small fw-semibold">Username</label>
              <input id="auUsername" type="text" class="form-control" required>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label small fw-semibold">Full name</label>
              <input id="auFullName" type="text" class="form-control" required>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label small fw-semibold">Password</label>
              <input id="auPassword" type="text" class="form-control" minlength="6" required>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label small fw-semibold">Role</label>
              <select id="auRole" class="form-select">
                <option value="viewer">Viewer (student)</option>
                <option value="publisher">Publisher (faculty/dept/club)</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label small fw-semibold">Department</label>
              <select id="auDept" class="form-select">
                <option value="">— None —</option>
              </select>
            </div>
            <div class="col-12">
              <div id="auError" class="alert alert-danger small d-none"></div>
              <div id="auOk" class="alert alert-success small d-none">User created</div>
              <button class="btn btn-primary" type="submit"><i class="bi bi-person-plus"></i> Create user</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <h2 class="h5 mb-3">Add a department</h2>
          <form id="addDeptForm" class="row g-2">
            <div class="col-12 col-md-8">
              <input id="adName" type="text" class="form-control" placeholder="Department name" required>
            </div>
            <div class="col-12 col-md-4">
              <button class="btn btn-outline-primary w-100" type="submit"><i class="bi bi-plus-lg"></i> Add</button>
            </div>
          </form>
          <div id="adMsg" class="small mt-2"></div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0">All users</h2>
            <button class="btn btn-sm btn-outline-secondary" id="refreshUsersBtn">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Department</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="usersTbody">
                <tr><td colspan="5" class="text-center text-muted py-3">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/sw-register.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
