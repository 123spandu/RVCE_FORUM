<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Connect · Login</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-bg">
  <main class="container d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow-lg login-card border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="brand-circle mx-auto mb-3">
            <i class="bi bi-mortarboard-fill"></i>
          </div>
          <h1 class="h4 fw-bold mb-1">Campus Connect</h1>
          <p class="text-muted small mb-0">Stay in the loop with your campus</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label small fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label small fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button" id="togglePw" tabindex="-1" aria-label="Show password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div id="loginError" class="alert alert-danger small d-none mb-3"></div>

          <button class="btn btn-primary w-100 fw-semibold" type="submit" id="loginBtn">
            <span id="loginBtnText">Sign in</span>
            <span class="spinner-border spinner-border-sm ms-2 d-none" id="loginBtnSpinner" role="status"></span>
          </button>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
          New accounts are issued by your administrator.
        </p>
      </div>
    </div>
  </main>

  <script src="/js/sw-register.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
